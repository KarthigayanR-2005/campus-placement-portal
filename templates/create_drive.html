{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Create Placement Drive</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/company/create_drive">
                    <div class="mb-3">
                        <label class="form-label">Job Title / Role</label>
                        <input type="text" class="form-control" name="job_title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea class="form-control" name="job_description" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria (e.g., Min CGPA 7.0)</label>
                        <textarea class="form-control" name="eligibility" rows="2" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" name="deadline" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Publish Drive</button>
                    <a href="/company/dashboard" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
