{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>Student Registration</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/register/student">
                    
                    <h5 class="text-muted mb-3">Account Details</h5>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <hr>
                    <h5 class="text-muted mb-3">Student Profile</h5>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text" class="form-control" name="roll_number" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-3">Register as Student</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small>Already have an account? <a href="/login">Login here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
