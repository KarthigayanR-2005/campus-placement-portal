{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>Company Partner Registration</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/register/company">
                    
                    <h5 class="text-muted mb-3">Login Credentials</h5>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <hr>
                    <h5 class="text-muted mb-3">Company Details</h5>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control" name="company_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HR Contact Name</label>
                        <input type="text" class="form-control" name="hr_contact" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Website URL</label>
                        <input type="url" class="form-control" name="website" placeholder="https://...">
                    </div>

                    <button type="submit" class="btn btn-dark w-100 mt-3">Submit for Approval</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
